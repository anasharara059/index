:root{
  --bg: #0A0A0C;
  --bg-soft: #0F0F12;
  --surface: rgba(255,255,255,0.035);
  --surface-hi: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.09);
  --text: #F5F3EF;
  --text-dim: #9A9AA2;
  --text-faint: #5C5C63;
  --accent: #FF5A1F;
  --accent-dim: rgba(255,90,31,0.16);
  --accent-light: #FFB199;
  --accent2: #6C4CFF;
  --accent2-dim: rgba(108,76,255,0.16);
  --accent2-light: #C9BBFF;
  --danger: #E5484D;
  --radius: 16px;
  --font-body: 'Thmanyah', 'Cairo', 'Tajawal', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

.app-root{
  background: radial-gradient(ellipse 120% 80% at 50% -10%, #17110c 0%, var(--bg) 55%);
  min-height: 100vh;
  color: var(--text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}
.loading-root{ display:flex; align-items:center; justify-content:center; }
.auth-page{ width:100%; display:flex; align-items:center; justify-content:center; padding: 24px; }
.auth-card{ background: var(--surface); border:1px solid var(--border); border-radius: var(--radius); padding: 28px; width: 360px; max-width: 90vw; }
.auth-brand{ font-size:19px; margin-bottom: 4px; justify-content:center; }
.auth-error{ background: rgba(229,72,77,0.12); border:1px solid rgba(229,72,77,0.4); color: #ff8489; font-size:12.5px; padding: 9px 12px; border-radius: 10px; margin-top: 10px; }
.app-root *{ box-sizing: border-box; }
.muted{ color: var(--text-dim); }
.small{ font-size: 12px; }
.accent-text{ color: var(--accent); }

/* Nav */
.navbar{
  display:flex; align-items:center; gap:20px;
  padding: 14px 22px;
  border-bottom: 1px solid var(--border);
  position: sticky; top:0; z-index: 20;
  background: rgba(10,10,12,0.85);
  backdrop-filter: blur(10px);
}
.brand{ display:flex; align-items:center; gap:8px; font-weight:700; font-size:15px; letter-spacing:-0.01em; }
.brand-dot{ width:9px; height:9px; border-radius:50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 10px var(--accent), 0 0 10px var(--accent2); }
.navtabs{ display:flex; gap:4px; flex:1; }
.navtab{
  display:flex; align-items:center; gap:6px;
  background:transparent; border:none; color: var(--text-dim);
  padding: 7px 13px; border-radius: 999px; font-size: 13px; font-weight:500;
  cursor:pointer; transition: all .15s ease;
}
.navtab:hover{ color: var(--text); background: var(--surface); }
.navtab.active{ color: var(--bg); background: var(--text); }

.page-wrap{ max-width: 980px; margin: 0 auto; padding: 32px 20px 80px; }

/* Buttons / inputs */
.btn{
  display:inline-flex; align-items:center; gap:7px;
  padding: 10px 18px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); font-size: 13.5px; font-weight: 600;
  cursor:pointer; transition: all .15s ease;
}
.btn:hover{ background: var(--surface-hi); }
.btn-primary{ background: linear-gradient(135deg, var(--accent), var(--accent2)); border-color: transparent; color: #0d0714; font-weight:700; }
.btn-primary:hover{ filter: brightness(1.1); }
.btn-ghost{ background: transparent; }
.btn-danger{ background: rgba(229,72,77,0.12); border-color: rgba(229,72,77,0.4); color: #ff8489; }
.btn-danger:hover{ background: rgba(229,72,77,0.2); }
.btn.full{ width:100%; justify-content:center; }
.icon-btn{
  display:flex; align-items:center; justify-content:center;
  width:34px; height:34px; border-radius: 999px; border: 1px solid var(--border);
  background: var(--surface); color: var(--text-dim); cursor:pointer; transition: all .15s ease;
}
.icon-btn:hover{ color: var(--text); background: var(--surface-hi); }
.icon-btn.tiny{ width:26px; height:26px; margin-left:4px; }
.pill-btn{
  display:inline-flex; align-items:center; gap:7px; padding: 8px 14px;
  border-radius: 999px; border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-size: 13px; cursor:pointer;
}
.select{ background: var(--surface); border:1px solid var(--border); color: var(--text); border-radius: 10px; padding: 9px 12px; font-size: 13px; }
.select.full{ width:100%; margin-bottom: 14px; }
.field-label{ font-size:12px; color: var(--text-dim); margin-bottom:6px; display:block; margin-top: 10px; }
.dot{ width:8px; height:8px; border-radius:50%; display:inline-block; }

/* Dropdowns */
.dropdown-wrap{ position: relative; display:inline-block; }
.dropdown-menu{
  position:absolute; top: calc(100% + 6px); left:0; z-index: 30;
  background: #17171b; border:1px solid var(--border); border-radius: 12px;
  padding: 6px; min-width: 170px; box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}
.dropdown-item{
  display:flex; align-items:center; gap:9px; width:100%; text-align:left;
  padding: 8px 10px; border-radius: 8px; background:transparent; border:none;
  color: var(--text); font-size: 13px; cursor:pointer;
}
.dropdown-item:hover{ background: var(--surface-hi); }

/* Timer page */
.timer-page{ display:flex; flex-direction:column; align-items:center; gap:28px; }
.pill-tabs{ display:flex; flex-wrap:wrap; justify-content:center; gap:8px; background: var(--surface); padding:6px; border-radius: 999px; border:1px solid var(--border); }
.pill-tab{
  display:flex; align-items:center; gap:6px; padding: 8px 15px; border-radius: 999px;
  border:none; background:transparent; color: var(--text-dim); font-size:13px; font-weight:600; cursor:pointer;
}
.pill-tab.active{ background: var(--text); color: var(--bg); }
.timer-card{ display:flex; flex-direction:column; align-items:center; gap:22px; width:100%; }
.timer-card.phase-break{ --accent: var(--accent2); --accent-dim: var(--accent2-dim); --accent-light: var(--accent2-light); }
.mode-header{ display:flex; align-items:center; gap:10px; }
.mode-chip{ display:flex; align-items:center; gap:6px; background: var(--accent-dim); color: var(--accent-light); padding:6px 13px; border-radius:999px; font-size:12.5px; font-weight:600; }
.session-chip{ color: var(--text-dim); font-size:12.5px; }
.dial{ position: relative; display:flex; align-items:center; justify-content:center; }
.ring-glow circle:nth-child(2){ filter: drop-shadow(0 0 10px var(--accent)); }
.dial-face{ position:relative; z-index:2; display:flex; flex-direction:column; align-items:center; }
.time-digits{ font-family: var(--font-mono); font-weight:700; font-size: 64px; letter-spacing: -0.02em; font-variant-numeric: tabular-nums; }
.minute-stepper{ display:flex; align-items:center; gap:16px; }
.stepper-btn{ width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background: var(--surface); color: var(--text); cursor:pointer; font-weight:700; }
.stepper-val{ font-family: var(--font-mono); font-size:14px; color: var(--text-dim); min-width:70px; text-align:center; }
.controls-row{ display:flex; gap:10px; }
.footer-meta{ display:flex; flex-direction:column; align-items:center; gap:4px; color: var(--text-dim); font-size:13px; }
.bottom-tools{ display:flex; gap:10px; margin-top: -6px; }
.mini-card{ transform: scale(0.82); }

/* Focus fullscreen */
.focus-overlay{
  position: fixed; inset:0; background: var(--bg); z-index: 100;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
}
.focus-exit{
  position:absolute; top:22px; right:22px; display:flex; align-items:center; gap:7px;
  background: var(--surface); border:1px solid var(--border); color: var(--text-dim);
  padding:8px 14px; border-radius:999px; cursor:pointer; font-size:13px;
}
.focus-card .time-digits{ font-size: 80px; }

/* Dashboard */
.dash-page{ display:flex; flex-direction:column; gap:20px; }
.dash-greeting h1{ font-size: 24px; margin:0 0 4px; letter-spacing:-0.01em; }
.card{ background: var(--surface); border:1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.card h3{ margin:0 0 14px; font-size:14.5px; font-weight:700; }
.stat-grid{ display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
.stat-card{ padding: 16px 18px; }
.stat-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 10px; }
.stat-value{ font-family: var(--font-mono); font-size: 22px; font-weight:700; margin-bottom:2px; }
.stat-accent{ border-color: rgba(255,106,57,0.35); background: var(--accent-dim); }
.dash-row{ display:grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.level-card{ display:flex; align-items:center; gap:18px; }
.level-avatar{ width:64px; height:64px; border-radius:50%; background: conic-gradient(from -90deg, var(--accent) 0deg, var(--accent2) calc(var(--p,60)*3.6deg), rgba(255,255,255,0.08) calc(var(--p,60)*3.6deg)); display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.level-avatar::after{ content:''; }
.level-num{ background: var(--bg); width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family: var(--font-mono); font-weight:700; font-size:18px; }
.level-info h3{ margin:0 0 2px; font-size:16px; }
.bar-track{ background: rgba(255,255,255,0.07); border-radius: 999px; height:7px; width:100%; overflow:hidden; margin: 8px 0 4px; }
.bar-fill{ background: var(--accent); height:100%; border-radius:999px; transition: width .4s ease; }
.compare-card h3{ margin-bottom: 14px; }
.compare-row{ display:flex; align-items:center; justify-content:space-between; gap:10px; }
.compare-val{ font-family: var(--font-mono); font-weight:700; font-size:18px; }
.delta-chip{ display:flex; align-items:center; gap:4px; padding: 6px 11px; border-radius:999px; font-size:12.5px; font-weight:700; }
.delta-chip.up{ background: rgba(255,106,57,0.15); color: var(--accent-light); }
.delta-chip.down{ background: rgba(255,255,255,0.06); color: var(--text-dim); }
.label-bars{ display:flex; flex-direction:column; gap:11px; }
.label-bar-row{ display:grid; grid-template-columns: 100px 1fr 60px; align-items:center; gap:10px; }
.label-bar-name{ display:flex; align-items:center; gap:7px; font-size:13px; }
.label-bar-val{ font-family: var(--font-mono); font-size:12.5px; color: var(--text-dim); text-align:right; }
.achv-grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; }
.achv-badge{ display:flex; align-items:center; gap:9px; padding:10px 12px; border-radius:12px; background: rgba(255,255,255,0.02); border:1px solid var(--border); opacity: 0.35; }
.achv-badge.earned{ opacity:1; background: var(--accent-dim); border-color: rgba(255,106,57,0.35); }
.achv-icon{ font-size:18px; }
.achv-name{ font-size:12.5px; font-weight:600; }
.heatmap-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.heatmap-grid{ display:flex; gap:3px; overflow-x:auto; padding-bottom: 4px; }
.heatmap-col{ display:flex; flex-direction:column; gap:3px; }
.heatmap-cell{ width:12px; height:12px; border-radius:3px; background: rgba(255,255,255,0.05); }
.heatmap-cell.lvl-1{ background: rgba(255,106,57,0.25); }
.heatmap-cell.lvl-2{ background: rgba(255,106,57,0.45); }
.heatmap-cell.lvl-3{ background: rgba(255,106,57,0.7); }
.heatmap-cell.lvl-4{ background: var(--accent); }
.heatmap-legend{ display:flex; align-items:center; gap:5px; margin-top:10px; }
.recent-list{ display:flex; flex-direction:column; gap:2px; }
.recent-row{ display:grid; grid-template-columns: 10px 110px 90px 1fr 70px; align-items:center; gap:10px; padding:9px 4px; border-bottom: 1px solid var(--border); font-size:13px; }
.recent-row:last-child{ border-bottom:none; }
.recent-label{ font-weight:600; }
.recent-min{ font-family: var(--font-mono); text-align:right; }

/* History */
.history-page{ display:flex; flex-direction:column; gap:16px; }
.history-toolbar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.search-wrap{ display:flex; align-items:center; gap:8px; background: var(--surface); border:1px solid var(--border); border-radius:10px; padding: 9px 12px; flex:1; min-width:220px; }
.search-wrap input{ background:transparent; border:none; outline:none; color: var(--text); font-size:13px; width:100%; }
.toolbar-spacer{ flex:1; }
.table-card{ padding: 8px 14px; }
.history-table{ width:100%; border-collapse: collapse; }
.history-table th{ text-align:left; font-size:11.5px; text-transform:uppercase; letter-spacing:0.04em; color: var(--text-faint); padding: 12px 10px; border-bottom: 1px solid var(--border); }
.history-table td{ padding: 11px 10px; font-size:13.5px; border-bottom: 1px solid var(--border); }
.history-table tr:last-child td{ border-bottom:none; }
.history-table td .dot{ margin-right:7px; }

/* Modal */
.modal-backdrop{ position:fixed; inset:0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); display:flex; align-items:center; justify-content:center; z-index:200; }
.modal-card{ background: #131316; border:1px solid var(--border); border-radius: 18px; padding: 22px; width: 340px; max-width: 90vw; }
.modal-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom: 6px; }
.modal-head h3{ margin:0; font-size:15px; }
.modal-actions{ display:flex; justify-content:flex-end; gap:8px; margin-top: 16px; }
.modal-divider{ height:1px; background: var(--border); margin: 18px 0; }
.confirm-row{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }

/* Responsive */
@media (max-width: 720px){
  .stat-grid{ grid-template-columns: repeat(2,1fr); }
  .dash-row{ grid-template-columns: 1fr; }
  .navtabs{ overflow-x:auto; }
  .time-digits{ font-size: 48px; }
  .recent-row{ grid-template-columns: 8px 1fr 60px; }
  .recent-row .muted.small:nth-child(3){ display:none; }
}

@media print{
  .no-print{ display:none !important; }
  .app-root{ background: white; color: black; }
  .page-wrap{ padding:0; max-width:none; }
  .card{ border-color: #ccc; background:white; }
  .history-table th, .history-table td{ color:black; border-color:#ccc; }
}
